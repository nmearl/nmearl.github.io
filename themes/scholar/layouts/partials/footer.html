<footer class="site-footer">
  <div class="container">
    <span class="footer-name">&copy; {{ now.Format "2006" }} {{ .Site.Params.author }}</span>
    <div class="footer-right">
      <a href="#" class="footer-top">back to top ↑</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-moon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M17.293 13.293A8 8 0 0 1 6.707 2.707a8.001 8.001 0 1 0 10.586 10.586z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M10 2a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1zm4.22 1.78a1 1 0 0 1 0 1.415l-.707.707a1 1 0 1 1-1.414-1.414l.707-.707a1 1 0 0 1 1.414 0zM18 9a1 1 0 1 1 0 2h-1a1 1 0 1 1 0-2h1zM5.636 14.364a1 1 0 0 1-1.414 0l-.707-.707a1 1 0 1 1 1.414-1.414l.707.707a1 1 0 0 1 0 1.414zM10 15a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1zm-5.657-1.636a1 1 0 0 1 0-1.414l.707-.707a1 1 0 0 1 1.414 1.414l-.707.707a1 1 0 0 1-1.414 0zM4 10a1 1 0 0 1-1 1H2a1 1 0 1 1 0-2h1a1 1 0 0 1 1 1zm9.293-5.707a1 1 0 0 1 1.414 1.414l-.707.707A1 1 0 0 1 12.586 5l.707-.707zM10 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
  </div>
</footer>

<script>
  (function () {
    var btn = document.getElementById('theme-toggle');
    btn.addEventListener('click', function () {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      var next = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  })();
</script>
