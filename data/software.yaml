projects:
  - role: "Lead Developer"
    name: "FEADME"
    short: "GPU-accelerated Bayesian spectral fitting for AGN and TDE disk profiles"
    full_name: "Fast Elliptical Accretion Disk Modeling Engine"
    description: "GPU-accelerated Bayesian fitting framework (JAX/NumPyro) for modeling double-peaked and broad-line AGN/TDE spectra via relativistic elliptical accretion disk profiles. Enables population-level inference across large samples using HMC and variational methods on GPU hardware."
    links:
      - label: "github"
        url: "https://github.com/nmearl/feadme"
      - label: "paper"
        url: "https://arxiv.org/abs/2512.10228"

  - role: "Lead Developer"
    name: "NAPTIME"
    short: "Neural-process framework for photometric transient classification at LSST scale"
    full_name: "Neural Astrophysical Photometric Transient Identification and Modeling Engine"
    description: "Convolutional conditional neural process for photometric transient classification under sparse, irregular observational context, designed for Rubin/LSST alert streams. Incorporates a joint reconstruction-and-classification objective and an optional host-galaxy metadata branch."
    links:
      - label: "github"
        url: "https://github.com/nmearl/naptime"

  - role: "Lead Developer"
    name: "CosmicDS"
    short: "NASA/NSF interactive data-story platform for STEM classrooms"
    full_name: "Cosmic Data Stories"
    description: "NASA Science Activation–funded interactive data-story platform for STEM classrooms, built within the Glue-Viz ecosystem. Enables scientists to create linked-view, data-driven educational narratives without web-development expertise. Deployed across middle school, high school, and introductory college courses."
    links:
      - label: "github"
        url: "https://github.com/cosmicds"
      - label: "website"
        url: "https://cosmicds.cfa.harvard.edu"

  - role: "Developer"
    name: "OTTER"
    short: "Open multiwavelength transient event repository and analysis platform"
    full_name: "Open mulTiwavelength Transient Event Repository"
    description: "Public repository and analysis platform for multiwavelength transient events, with a focus on TDEs, supernovae, and nuclear flares. Contributed database and website infrastructure, and catalog integration tools."
    links:
      - label: "github"
        url: "https://github.com/astro-otter/otter"
      - label: "paper"
        url: "https://arxiv.org/abs/2509.05405"

  - role: "Developer"
    name: "Astropy"
    short: "Community-wide standards for astronomical data analysis"
    full_name: "The Astropy Project"
    description: "Core contributor to the Astropy project, including spectroscopic and JWST-oriented infrastructure. Supporting community-wide standards for astronomical data analysis, interoperability, and reproducibility."
    links:
      - label: "github"
        url: "https://github.com/astropy/astropy"
      - label: "paper"
        url: "https://ui.adsabs.harvard.edu/abs/2022ApJ...935..167A"
      - label: "website"
        url: "https://www.astropy.org"

  - role: "Former Lead Developer"
    name: "Specutils"
    short: "Core 1D spectral analysis library in the Astropy ecosystem"
    full_name: "Astropy Spectral Analysis Library"
    description: "Core spectral analysis library in the Astropy ecosystem. Led development of the primary infrastructure, spectral arithmetic, and calibration routines for 1D spectroscopic data. Widely used across the astronomical community for HST, JWST, and ground-based spectroscopy."
    links:
      - label: "github"
        url: "https://github.com/astropy/specutils"
      - label: "docs"
        url: "https://specutils.readthedocs.io"

  - role: "Former Lead Developer"
    name: "JDAViz"
    short: "Interactive visualization tools for JWST spectroscopic data"
    full_name: "JWST Data Analysis Visualization Tools"
    description: "Next-generation visualization and analysis tools for the Astropy ecosystem, including SpecViz (1D spectra), CubeViz (IFU data cubes), and MOSViz (multi-object spectroscopy). Designed for JWST data products and released as part of the official STScI analysis suite."
    links:
      - label: "github"
        url: "https://github.com/spacetelescope/jdaviz"
      - label: "docs"
        url: "https://jdaviz.readthedocs.io"
      - label: "paper"
        url: "https://ascl.net/2307.001"

  - role: "Lead Developer"
    name: "Spectacle"
    short: "Kinematic line-analysis for synthetic and observed absorption spectra"
    full_name: "Spectroscopic Line Analysis Framework"
    description: "Automated kinematic line-analysis package for synthetic and observed UV absorption spectra. Used to fit complex multi-component absorption profiles and quantify resolution-dependent CGM kinematics in hydrodynamic simulations, with direct comparison to HST/COS observations."
    links:
      - label: "github"
        url: "https://github.com/nmearl/spectacle"

  - role: "Developer"
    name: "Pandeia"
    short: "Exposure time calculator for JWST"
    full_name: "JWST Exposure Time Calculator"
    description: "Analytical engine and collaborative web application for JWST exposure time calculation. Led development sprints, shipped collaborative analysis features for the initial call-for-proposals release, and coordinated MIRI reference files and validation workflows."
    links:
      - label: "website"
        url: "https://jwst.etc.stsci.edu"
      - label: "paper"
        url: "https://ui.adsabs.harvard.edu/abs/2016SPIE.9910E..16P"
