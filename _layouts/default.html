<!DOCTYPE html>
<html lang="en">

  {% include head.html %}

  <body>
    <nav class="nav">
      <div class="nav-container">
        {% if page.title == "Home" %}
          <h2 class="nav-title"></h2>
        {% else %}
          <a href="{{ site.baseurl }}/">
            <h2 class="nav-title">{{ site.title }}</h2>
          <a href="{{ site.baseurl }}/">
        {% endif %}
        <ul>
          <!--<li><a href="{{ '/projects' | prepend: site.url }}">Projects</a></li>-->
          <li><a href="{{ '/cv' | prepend: site.url }}">CV</a></li>
          <li><a href="{{ '/contact' | prepend: site.url }}">Contact</a></li>
          <!--<li><a href="{{ '/blog' | prepend: site.url }}">Blog</a></li>-->
        </ul>
    </div>
  </nav>

    <main>

    <footer>
      <h1>
        <a href="https://github.com/nmearl"><i class="fa fa-github-alt" aria-hidden="true" style="margin-right: 12px;"></i></a>
        <a href="https://twitter.com/nchlsearl"><i class="fa fa-twitter" aria-hidden="true"></i></a>
        <a href="https://www.linkedin.com/in/nicholas-earl-952b8088/"><i class="fa fa-linkedin" aria-hidden="true" style="margin-left: 12px;"></i></a>

      </span>

</html>
